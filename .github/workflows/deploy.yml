name: CI/CD Live Bare-VPS Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying changes over Secure SSH
        uses: appleboy/ssh-action@master
        with:
          host: 170.9.233.236
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Clean up any existing running containers to free up ports
            if [ -d "/opt/VisionTemplate" ]; then
              cd /opt/VisionTemplate
              sudo /usr/bin/docker compose down --remove-orphans || true
            fi

            # 2. Obliterate the directory to ensure no missing files
            sudo rm -rf /opt/VisionTemplate

            # 3. Ensure /opt exists and clone a 100% fresh copy from GitHub
            sudo mkdir -p /opt
            sudo chown -R ubuntu:ubuntu /opt
            cd /opt
            git clone https://github.com/visionaininja/VisionTemplate.git

            # 4. Build and run completely clean
            cd /opt/VisionTemplate
            sudo /usr/bin/docker compose build --no-cache
            sudo /usr/bin/docker compose up -d
