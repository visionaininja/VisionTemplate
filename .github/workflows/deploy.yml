name: CI/CD Live Bare-VPS Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying changes over Secure SSH
        uses: appleboy/ssh-action@master
        with:
          host: 170.9.233.236
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure /opt exists and is owned by the ubuntu user
            sudo mkdir -p /opt
            sudo chown -R ubuntu:ubuntu /opt

            # 2. Safely clone the repository if missing, or reset it if it exists
            if [ ! -d "/opt/VisionTemplate" ]; then
              cd /opt
              git clone https://github.com/visionaininja/VisionTemplate.git
            else
              cd /opt/VisionTemplate
              git reset --hard HEAD
              git clean -fd
            fi

            # 3. Pull fresh modifications and run containers using absolute binary paths
            cd /opt/VisionTemplate
            git pull origin main
            
            # 4. Rebuild the app with zero cached layers using explicit docker paths
            sudo /usr/bin/docker compose down --remove-orphans
            sudo /usr/bin/docker compose build --no-cache
            sudo /usr/bin/docker compose up -d
