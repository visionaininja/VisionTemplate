name: CI/CD Live Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying changes over Secure SSH
        uses: appleboy/ssh-action@master
        with:
          host: 170.9.233.236
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure the parent directory exists and we have permissions
            sudo mkdir -p /opt
            sudo chown -R ubuntu:ubuntu /opt

            # 2. If the folder doesn't exist, clone it fresh
            if [ ! -d "/opt/VisionTemplate" ]; then
              cd /opt
              git clone https://github.com/visionaininja/VisionTemplate.git
            fi

            # 3. Jump in, sync up, and build hands-free
            cd /opt/VisionTemplate
            git reset --hard HEAD
            git pull origin main
            sudo docker compose down
            sudo docker compose build --no-cache
            sudo docker compose up -d
