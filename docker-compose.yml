version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    restart: always
    environment:
      - NODE_ENV=production

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=vision_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
